name: windows-ci

on: [push, pull_request]

jobs:
  verify:
    runs-on: windows-latest
    env:
      CFB27_NATIVE_ARTIFACTS: ${{ github.workspace }}\native\build-release\Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: cmake -S native -B native/build-release -A x64
      - run: cmake --build native/build-release --config Release
      - run: native/build-release/Release/cfb27_startup_smoke.exe native/build-release/Release/cfb27_lua_host.dll
      - run: native/build-release/Release/cfb27_memory_reader_smoke.exe
      - run: native/build-release/Release/cfb27_telemetry_smoke.exe
      - run: native/build-release/Release/cfb27_memory_transaction_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_profile_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_field_schema_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_discovery_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_catalog_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_record_access_smoke.exe
      - run: native/build-release/Release/cfb27_frtk_lua_api_smoke.exe native/build-release/Release/cfb27_lua_host.dll
      - run: native/build-release/Release/cfb27_protocol_smoke.exe native/build-release/Release/cfb27_lua_host.dll
        env:
          CFB27_SMOKE_ALLOW_WRITES: '1'
      - run: npm run pack:preview
      - uses: actions/upload-artifact@v4
        with:
          name: cfb27-lua-hook-0.2.0-dev.2
          path: dist/
